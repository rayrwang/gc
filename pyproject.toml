[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "gc"
version = "0.0.1"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "torch",
    "tensorboard",
    "torchvision",
    "opencv-python==4.12.*",  # Font issue on newer versions
    "pygame-ce",
    "tqdm",
    "dacite",
]

[project.optional-dependencies]
dev = [
    "ruff",
    "pytest",
]

[tool.setuptools]
packages = ["src", "simple"]

[tool.pytest.ini_options]
pythonpath = ["."]
